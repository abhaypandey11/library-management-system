<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibraryOS — Members</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">📚</div>
            <div class="brand-text">
                <span class="brand-name">LibraryOS</span>
                <span class="brand-sub">Management System</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">⬛</span><span>Dashboard</span></a>
            <a href="books.html" class="nav-item"><span class="nav-icon">📖</span><span>Books</span></a>
            <a href="members.html" class="nav-item active"><span class="nav-icon">👥</span><span>Members</span></a>
            <a href="issues.html" class="nav-item"><span class="nav-icon">🔄</span><span>Issue & Return</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="status-dot"></div>
            <span>Server Online</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title">Members</h1>
                <p class="page-subtitle">Manage library members and registrations</p>
            </div>
            <div class="topbar-right">
                <button class="btn btn-primary" onclick="openModal('addMemberModal')">+ Register Member</button>
            </div>
        </header>

        <div class="search-bar-wrapper">
            <input type="text" id="memberSearch" class="search-input" placeholder="🔍  Search members by name, email or type..." oninput="filterMembers()">
        </div>

        <section class="section-card">
            <div class="section-header">
                <h2 class="section-title">All Members</h2>
                <span class="record-count" id="memberCount">0 records</span>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Member Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody">
                        <tr><td colspan="6" class="loading-row">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Add Member Modal -->
    <div class="modal-overlay" id="addMemberModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Register New Member</h3>
                <button class="modal-close" onclick="closeModal('addMemberModal')">✕</button>
            </div>
            <div class="modal-body">
                <div id="addMemberError" class="error-box" style="display:none"></div>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="addName" class="form-input" placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="addEmail" class="form-input" placeholder="Enter email address">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="text" id="addPhone" class="form-input" placeholder="10 digit number">
                    </div>
                    <div class="form-group">
                        <label>Member Type *</label>
                        <select id="addMemberType" class="form-input">
                            <option value="">Select type</option>
                            <option value="Student">Student</option>
                            <option value="Teacher">Teacher</option>
                            <option value="Staff">Staff</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('addMemberModal')">Cancel</button>
                <button class="btn btn-primary" onclick="addMember()">Register</button>
            </div>
        </div>
    </div>

    <!-- Edit Member Modal -->
    <div class="modal-overlay" id="editMemberModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit Member</h3>
                <button class="modal-close" onclick="closeModal('editMemberModal')">✕</button>
            </div>
            <div class="modal-body">
                <div id="editMemberError" class="error-box" style="display:none"></div>
                <input type="hidden" id="editMemberId">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="editName" class="form-input">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="editEmail" class="form-input">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone *</label>
                        <input type="text" id="editPhone" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>Member Type *</label>
                        <select id="editMemberType" class="form-input">
                            <option value="Student">Student</option>
                            <option value="Teacher">Teacher</option>
                            <option value="Staff">Staff</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('editMemberModal')">Cancel</button>
                <button class="btn btn-primary" onclick="updateMember()">Update Member</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="js/api.js"></script>
    <script src="js/members.js"></script>
</body>
</html>
