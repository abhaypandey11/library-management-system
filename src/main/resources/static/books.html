<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibraryOS — Books</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">📚</div>
            <div class="brand-text">
                <span class="brand-name">LibraryOS</span>
                <span class="brand-sub">Management System</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item" data-page="dashboard"><span class="nav-icon">⬛</span><span>Dashboard</span></a>
            <a href="books.html" class="nav-item active" data-page="books"><span class="nav-icon">📖</span><span>Books</span></a>
            <a href="members.html" class="nav-item" data-page="members"><span class="nav-icon">👥</span><span>Members</span></a>
            <a href="issues.html" class="nav-item" data-page="issues"><span class="nav-icon">🔄</span><span>Issue & Return</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="status-dot"></div>
            <span>Server Online</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title">Books</h1>
                <p class="page-subtitle">Manage your library book collection</p>
            </div>
            <div class="topbar-right">
                <button class="btn btn-primary" onclick="openModal('addBookModal')">+ Add New Book</button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-bar-wrapper">
            <input type="text" id="bookSearch" class="search-input" placeholder="🔍  Search books by title, author or category..." oninput="filterBooks()">
        </div>

        <!-- Books Table -->
        <section class="section-card">
            <div class="section-header">
                <h2 class="section-title">All Books</h2>
                <span class="record-count" id="bookCount">0 records</span>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>ISBN</th>
                            <th>Category</th>
                            <th>Total</th>
                            <th>Available</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booksTableBody">
                        <tr><td colspan="8" class="loading-row">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Add Book Modal -->
    <div class="modal-overlay" id="addBookModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Book</h3>
                <button class="modal-close" onclick="closeModal('addBookModal')">✕</button>
            </div>
            <div class="modal-body">
                <div id="addBookError" class="error-box" style="display:none"></div>
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="addTitle" class="form-input" placeholder="Enter book title">
                </div>
                <div class="form-group">
                    <label>Author *</label>
                    <input type="text" id="addAuthor" class="form-input" placeholder="Enter author name">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ISBN *</label>
                        <input type="text" id="addIsbn" class="form-input" placeholder="10-13 characters">
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <input type="text" id="addCategory" class="form-input" placeholder="e.g. Technology">
                    </div>
                </div>
                <div class="form-group">
                    <label>Total Copies *</label>
                    <input type="number" id="addTotalCopies" class="form-input" placeholder="Enter number of copies" min="1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('addBookModal')">Cancel</button>
                <button class="btn btn-primary" onclick="addBook()">Add Book</button>
            </div>
        </div>
    </div>

    <!-- Edit Book Modal -->
    <div class="modal-overlay" id="editBookModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit Book</h3>
                <button class="modal-close" onclick="closeModal('editBookModal')">✕</button>
            </div>
            <div class="modal-body">
                <div id="editBookError" class="error-box" style="display:none"></div>
                <input type="hidden" id="editBookId">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="editTitle" class="form-input">
                </div>
                <div class="form-group">
                    <label>Author *</label>
                    <input type="text" id="editAuthor" class="form-input">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ISBN *</label>
                        <input type="text" id="editIsbn" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <input type="text" id="editCategory" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label>Total Copies *</label>
                    <input type="number" id="editTotalCopies" class="form-input" min="1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('editBookModal')">Cancel</button>
                <button class="btn btn-primary" onclick="updateBook()">Update Book</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/books.js"></script>
</body>
</html>
